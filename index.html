<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>任务管理系统</h1>
    <div id="task-form">
        <h2>添加任务</h2>
        <input type="date" id="task-date" placeholder="日期" required>
        <input type="text" id="task-person" placeholder="人员" required>
        <input type="text" id="task-description" placeholder="任务描述" required>
        <button id="add-task">添加任务</button>
    </div>
    <div id="task-list">
        <h2>任务列表</h2>
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>人员</th>
                    <th>任务</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <!-- 任务信息将通过 JavaScript 动态加载 -->
            </tbody>
        </table>
    </div>

    <!-- 引入 Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
