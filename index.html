<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务排期表</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>任务排期表</h1>
    <div id="filter">
        <label for="person-select">选择人员：</label>
        <select id="person-select">
            <option value="鹏飞">鹏飞</option>
            <option value="志亚">志亚</option>
            <option value="琦斌">琦斌</option>
            <option value="祥永">祥永</option>
            <option value="南迪">南迪</option>
        </select>
    </div>
    <table id="schedule-table">
        <thead>
            <tr>
                <th>日期</th>
                <th>任务</th>
            </tr>
        </thead>
        <tbody>
            <!-- 任务信息将通过 JavaScript 动态加载 -->
        </tbody>
    </table>
    <script src="script.js"></script>
</body>
</html>
